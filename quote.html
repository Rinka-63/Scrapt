<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote</title>
  <style>
    :root {
      --bg-1: #f8f5f7;
      --bg-2: #f2e9ea;
      --paper: #f7f0ec;
      --paper-2: #fffaf6;
      --ink: #5c352e;
      --ink-soft: #7b5b52;
      --accent: #b86248;
      --accent-soft: #d98e78;
      --mint: #b8d8c7;
      --mint-deep: #6f8f7d;
      --gold: #efbf43;
      --rose: #eca1ad;
      --shadow: 0 24px 48px rgba(114, 79, 64, 0.14);
      --panel-w: min(1020px, calc(100vw - 24px));
      --page-pad: clamp(8px, 2vw, 24px);
      --card-pad: clamp(14px, 2.4vw, 28px);
      --gap: clamp(14px, 2vw, 24px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--page-pad);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 88%, rgba(239, 176, 190, 0.56), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(255,255,255,0.78), transparent 18%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      overflow-x: hidden;
    }

    .shell {
      position: relative;
      width: var(--panel-w);
      border-radius: 32px;
      padding: var(--card-pad);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.9), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.48)),
        var(--paper);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(133, 93, 81, 0.08) 0.7px, transparent 0.7px),
        radial-gradient(rgba(255,255,255,0.9) 0.7px, transparent 0.7px);
      background-size: 16px 16px, 20px 20px;
      background-position: 0 0, 8px 7px;
      opacity: 0.22;
      pointer-events: none;
    }

    .decor {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .blob,
    .cross,
    .heart-line,
    .dots,
    .spark,
    .tape {
      position: absolute;
    }

    .blob {
      left: -26px;
      bottom: -24px;
      width: 220px;
      height: 150px;
      background: radial-gradient(circle at 40% 40%, rgba(236, 161, 173, 0.4), rgba(236, 161, 173, 0.08) 70%, transparent 72%);
      filter: blur(4px);
    }

    .cross {
      right: 60px;
      top: 20px;
      width: 30px;
      height: 30px;
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--gold);
      border-radius: 999px;
    }

    .cross::before { width: 7px; height: 30px; }
    .cross::after { width: 30px; height: 7px; }

    .dots {
      right: 18px;
      top: 22px;
      display: grid;
      gap: 8px;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #a76d5c;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.56);
    }

    .spark {
      left: 52%;
      top: 86px;
      width: 42px;
      height: 42px;
    }

    .spark::before,
    .spark::after,
    .spark span,
    .spark i {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--gold);
      border-radius: 999px;
    }

    .spark::before,
    .spark::after {
      width: 4px;
      height: 42px;
    }

    .spark::after { transform: rotate(90deg); }
    .spark span { width: 4px; height: 32px; transform: rotate(45deg); }
    .spark i { width: 4px; height: 32px; transform: rotate(-45deg); }

    .heart-line {
      right: 26px;
      bottom: 26px;
      width: 104px;
      height: 42px;
      border-bottom: 4px solid rgba(184, 98, 72, 0.32);
      border-radius: 0 0 16px 16px;
      opacity: 0.7;
    }

    .heart-line::before,
    .heart-line::after {
      content: "";
      position: absolute;
      border-bottom: 4px solid rgba(184, 98, 72, 0.32);
    }

    .heart-line::before {
      left: 14px;
      bottom: 18px;
      width: 22px;
      height: 11px;
      transform: skewX(-38deg);
    }

    .heart-line::after {
      left: 36px;
      bottom: 13px;
      width: 26px;
      height: 18px;
      transform: skewX(38deg);
    }

    .tape {
      left: 34px;
      top: 96px;
      width: 88px;
      height: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.36), rgba(255,255,255,0) 48%),
        repeating-linear-gradient(90deg, rgba(233,155,170,0.45), rgba(233,155,170,0.45) 2px, rgba(255,220,224,0.7) 2px, rgba(255,220,224,0.7) 4px),
        #f4c8cf;
      transform: rotate(-18deg);
      opacity: 0.9;
    }

    .content {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      display: grid;
      gap: var(--gap);
    }

    .hero {
      display: grid;
      gap: 12px;
      justify-items: center;
      text-align: center;
      padding-top: 8px;
    }

    .eyebrow {
      margin: 0;
      color: #9b664d;
      font-size: 0.84rem;
      letter-spacing: 0.12em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.92;
      text-transform: uppercase;
      color: var(--accent);
      max-width: 620px;
    }

    .subtitle {
      margin: 0;
      max-width: 520px;
      color: var(--ink-soft);
      font-weight: 700;
      line-height: 1.55;
    }

    .quote-card {
      position: relative;
      padding: clamp(22px, 3vw, 34px) clamp(18px, 3vw, 32px) 24px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.68)),
        var(--paper-2);
      border: 1px solid rgba(255,255,255,0.84);
      box-shadow: 0 20px 42px rgba(114, 79, 64, 0.11);
      overflow: hidden;
      display: grid;
      gap: 16px;
    }

    .quote-card::before {
      content: "";
      position: absolute;
      right: -20px;
      top: 22px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,216,199,0.28), rgba(184,216,199,0.04) 72%, transparent 74%);
    }

    .quote-mark {
      margin: 0;
      font-size: 3.1rem;
      line-height: 0.8;
      color: rgba(184, 98, 72, 0.28);
      font-weight: 900;
    }

    blockquote {
      margin: 0;
      font-size: clamp(1.08rem, 2vw, 1.55rem);
      line-height: 1.78;
      color: var(--ink);
      font-weight: 800;
    }

    .quote-footer {
      display: grid;
      gap: 14px;
      padding-top: 4px;
    }

    .caption {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.68;
      font-weight: 700;
      text-align: left;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .meta-pill {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(184, 216, 199, 0.28);
      color: var(--mint-deep);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .bottom-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: end;
    }

    .mini-note {
      padding: 16px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(184, 98, 72, 0.08);
      text-align: left;
    }

    .mini-note p {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.6;
      font-weight: 700;
    }

    .next-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 14px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fffdf9;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 32px rgba(184, 97, 71, 0.22);
      transition: transform 0.2s ease;
    }

    .next-link:hover {
      transform: translateY(-1px);
    }

    .photo-row {
      display: grid;
      grid-template-columns: 1fr 0.88fr;
      gap: 14px;
      align-items: start;
    }

    .polaroid {
      background: #fff;
      padding: 10px 10px 18px;
      box-shadow: 0 18px 36px rgba(114, 79, 64, 0.12);
    }

    .polaroid.one { transform: rotate(-3deg); }
    .polaroid.two { transform: rotate(2.4deg); margin-top: 26px; }

    .photo {
      width: 100%;
      aspect-ratio: 4 / 4.4;
      background-size: cover;
      background-position: center;
    }

    .photo.one {
      background-image: url("https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=900&q=80");
    }

    .photo.two {
      background-image: url("https://images.unsplash.com/photo-1579684453377-927fbf58f4a7?auto=format&fit=crop&w=900&q=80");
    }

    @media (max-width: 640px) {
      .shell {
        border-radius: 26px;
        padding: 14px;
      }

      .content {
        gap: 14px;
      }

      .title {
        font-size: clamp(1.8rem, 9vw, 3rem);
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .quote-card {
        padding: 20px 16px 18px;
        border-radius: 26px;
        gap: 14px;
      }

      .quote-mark {
        font-size: 2.6rem;
      }

      blockquote {
        font-size: 0.98rem;
        line-height: 1.72;
      }

      .caption,
      .mini-note p {
        font-size: 0.9rem;
      }

      .meta-row {
        justify-content: flex-start;
      }

      .bottom-strip,
      .photo-row {
        grid-template-columns: 1fr;
      }

      .next-link {
        width: 100%;
      }

      .polaroid.two {
        margin-top: 0;
      }

      .cross {
        right: 52px;
        top: 14px;
        transform: scale(0.82);
      }

      .dots {
        right: 12px;
        top: 16px;
      }

      .spark {
        left: auto;
        right: 78px;
        top: 66px;
        transform: scale(0.78);
      }

      .tape {
        left: 18px;
        top: 82px;
        transform: rotate(-18deg) scale(0.84);
        transform-origin: left top;
      }

      .heart-line {
        right: 16px;
        bottom: 18px;
        transform: scale(0.8);
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="decor">
      <div class="blob"></div>
      <div class="cross"></div>
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="spark"><span></span><i></i></div>
      <div class="heart-line"></div>
      <div class="tape"></div>
    </div>

    <section class="content">
      <section class="hero">
        <p class="eyebrow">Nursing Spirit</p>
        <h1 class="title">Quote</h1>
    
        <article class="quote-card">
          <p class="quote-mark">&ldquo;</p>
          <blockquote>
            Kalo belum jelas diagnosanya jangan terburu ambil intervensi,
            siapa tau dia cuman mampir bentar nyari analgetik buat ngilangin nyerinya 😄
          </blockquote>

          <div class="quote-footer">
            <p class="caption">
              Kadang yang paling penting bukan buru-buru bertindak, tapi paham dulu apa yang sebenarnya sedang terjadi.
            </p>
          </div>
        </article>

        <section class="photo-row">
          <div class="polaroid one"><div class="photo one"></div></div>
          <div class="polaroid two"><div class="photo two"></div></div>
        </section>

        <section class="bottom-strip">
          <a class="next-link" href="bio.html">Next</a>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
