<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote</title>
  <style>
    :root {
      --bg-1: #f8f5f7;
      --bg-2: #f2e9ea;
      --paper: #f7f0ec;
      --paper-2: #fffaf6;
      --ink: #5c352e;
      --ink-soft: #7b5b52;
      --accent: #b86248;
      --accent-soft: #d98e78;
      --mint: #b8d8c7;
      --mint-deep: #6e8d7b;
      --gold: #efbf43;
      --rose: #eca1ad;
      --shadow: 0 24px 48px rgba(114, 79, 64, 0.14);
      --panel-w: min(860px, calc(100vw - 24px));
      --page-pad: clamp(8px, 2vw, 20px);
      --card-pad: clamp(14px, 2.6vw, 26px);
      --gap: clamp(14px, 2vw, 20px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--page-pad);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 88%, rgba(239, 176, 190, 0.56), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(255,255,255,0.78), transparent 18%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      overflow-x: hidden;
    }

    .shell {
      position: relative;
      width: var(--panel-w);
      border-radius: 30px;
      padding: var(--card-pad);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.9), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.48)),
        var(--paper);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(133, 93, 81, 0.08) 0.7px, transparent 0.7px),
        radial-gradient(rgba(255,255,255,0.9) 0.7px, transparent 0.7px);
      background-size: 16px 16px, 20px 20px;
      background-position: 0 0, 8px 7px;
      opacity: 0.22;
      pointer-events: none;
    }

    .decor { position: absolute; inset: 0; pointer-events: none; }
    .cross, .dots, .spark, .tape, .blob, .ekg, .pill, .heart {
      position: absolute;
    }

    .blob {
      left: -20px;
      bottom: -18px;
      width: 180px;
      height: 120px;
      background: radial-gradient(circle at 40% 40%, rgba(236, 161, 173, 0.4), rgba(236, 161, 173, 0.08) 70%, transparent 72%);
      filter: blur(4px);
    }

    .cross {
      right: 58px;
      top: 18px;
      width: 30px;
      height: 30px;
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--gold);
      border-radius: 999px;
    }

    .cross::before { width: 7px; height: 30px; }
    .cross::after { width: 30px; height: 7px; }

    .dots {
      right: 18px;
      top: 22px;
      display: grid;
      gap: 8px;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #a76d5c;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.56);
    }

    .spark {
      right: 116px;
      top: 92px;
      width: 40px;
      height: 40px;
    }

    .spark::before,
    .spark::after,
    .spark span,
    .spark i {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--gold);
      border-radius: 999px;
    }

    .spark::before,
    .spark::after {
      width: 4px;
      height: 40px;
    }

    .spark::after { transform: rotate(90deg); }
    .spark span { width: 4px; height: 30px; transform: rotate(45deg); }
    .spark i { width: 4px; height: 30px; transform: rotate(-45deg); }

    .tape {
      left: 20px;
      top: 82px;
      width: 88px;
      height: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.36), rgba(255,255,255,0) 48%),
        repeating-linear-gradient(90deg, rgba(233,155,170,0.45), rgba(233,155,170,0.45) 2px, rgba(255,220,224,0.7) 2px, rgba(255,220,224,0.7) 4px),
        #f4c8cf;
      transform: rotate(-18deg);
    }

    .pill {
      left: 84px;
      bottom: 118px;
      width: 52px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(236, 161, 173, 0.74) 0 50%, rgba(255, 250, 246, 0.94) 50% 100%);
      border: 2px solid rgba(184, 98, 72, 0.14);
      transform: rotate(-18deg);
    }

    .heart {
      right: 92px;
      bottom: 110px;
      width: 18px;
      height: 18px;
      background: var(--rose);
      transform: rotate(-45deg);
      border-radius: 4px 0 0 0;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--rose);
    }

    .heart::before { top: -9px; left: 0; }
    .heart::after { top: 0; left: 9px; }

    .ekg {
      left: 50%;
      bottom: 102px;
      width: 170px;
      height: 42px;
      transform: translateX(-50%);
      opacity: 0.44;
      border-bottom: 4px solid rgba(184, 98, 72, 0.34);
    }

    .ekg::before,
    .ekg::after {
      content: "";
      position: absolute;
      border-bottom: 4px solid rgba(184, 98, 72, 0.34);
    }

    .ekg::before {
      left: 44px;
      bottom: 14px;
      width: 24px;
      height: 18px;
      transform: skewX(-42deg);
    }

    .ekg::after {
      left: 72px;
      bottom: 2px;
      width: 30px;
      height: 28px;
      transform: skewX(42deg);
    }

    .content {
      position: relative;
      z-index: 1;
      width: min(100%, 720px);
      margin: 0 auto;
      display: grid;
      gap: var(--gap);
      justify-items: center;
      text-align: center;
      padding: 4px 0 46px;
    }

    .eyebrow {
      margin: 0;
      color: #9b664d;
      font-size: 0.84rem;
      letter-spacing: 0.12em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.7rem);
      line-height: 0.94;
      text-transform: uppercase;
      color: var(--accent);
    }

    .quote-card {
      width: 100%;
      padding: clamp(20px, 3vw, 30px) clamp(18px, 3vw, 28px) 24px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.68)),
        var(--paper-2);
      border: 1px solid rgba(255,255,255,0.84);
      box-shadow: 0 20px 42px rgba(114, 79, 64, 0.11);
      display: grid;
      gap: 14px;
    }

    .quote-mark {
      margin: 0;
      font-size: 3rem;
      line-height: 0.8;
      color: rgba(184, 98, 72, 0.28);
      font-weight: 900;
    }

    blockquote {
      margin: 0;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.78;
      color: var(--ink);
      font-weight: 800;
    }

    .nurse-strip {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .badge {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(184, 216, 199, 0.28);
      color: var(--mint-deep);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .button-row {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .next-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 14px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fffdf9;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.03em;
      box-shadow: 0 18px 32px rgba(184, 97, 71, 0.22);
    }

    @media (max-width: 640px) {
      .shell {
        border-radius: 26px;
        padding: 14px;
      }

      .title {
        font-size: clamp(1.8rem, 9vw, 3rem);
      }

      .quote-card {
        padding: 20px 16px 18px;
        border-radius: 26px;
      }

      blockquote {
        font-size: 0.98rem;
        line-height: 1.72;
      }

      .next-link {
        width: 100%;
      }

      .cross {
        right: 48px;
        top: 14px;
        transform: scale(0.82);
      }

      .dots {
        right: 12px;
        top: 16px;
      }

      .spark {
        right: 90px;
        top: 74px;
        transform: scale(0.82);
      }

      .tape {
        left: 14px;
        top: 76px;
        transform: rotate(-18deg) scale(0.84);
        transform-origin: left top;
      }

      .pill {
        left: 42px;
        bottom: 106px;
        transform: rotate(-18deg) scale(0.86);
      }

      .heart {
        right: 50px;
        bottom: 98px;
        transform: rotate(-45deg) scale(0.86);
      }

      .ekg {
        width: 132px;
        bottom: 96px;
        transform: translateX(-50%) scale(0.84);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="decor">
      <div class="blob"></div>
      <div class="cross"></div>
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="spark"><span></span><i></i></div>
      <div class="tape"></div>
      <div class="pill"></div>
      <div class="heart"></div>
      <div class="ekg"></div>
    </div>

    <section class="content">
      <p class="eyebrow">Nursing Spirit</p>
      <h1 class="title">Quote</h1>

      <article class="quote-card">
        <p class="quote-mark">&ldquo;</p>
        <blockquote>
          Kalo belum jelas diagnosanya jangan terburu ambil intervensi,
          siapa tau dia cuman mampir bentar nyari analgetik buat ngilangin nyerinya &#128516;
        </blockquote>
      </article>

      <section class="nurse-strip">
      </section>

      <section class="button-row">
        <a class="next-link" href="bio.html">Next</a>
      </section>
    </section>
  </main>
</body>
</html>
